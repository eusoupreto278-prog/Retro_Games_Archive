<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNAKE — Retro Games Archive</title>
  <style>
    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;
      color: #00ff41;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ===== HEADER ===== */
    .page-header {
      width: 100%;
      background: #001a00;
      border-bottom: 3px solid #00ff41;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-header h1 {
      font-size: 22px;
      color: #00ff41;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ff41;
    }

    .back-btn {
      background: #000;
      color: #ffff00;
      border: 2px outset #888;
      padding: 5px 14px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }

    .back-btn:hover {
      background: #003300;
      color: #00ff41;
      border-style: inset;
    }

    /* ===== GAME AREA ===== */
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
      flex: 1;
    }

    /* ===== HUD ===== */
    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 500px;
      background: #050505;
      border: 2px solid #00ff41;
      padding: 8px 20px;
    }

    .hud-item { text-align: center; }
    .hud-label { font-size: 10px; color: #555; letter-spacing: 3px; }
    .hud-value { font-size: 28px; color: #00ff41; text-shadow: 0 0 8px #00ff41; }

    /* ===== CANVAS ===== */
    canvas#snakeCanvas {
      border: 3px solid #00ff41;
      background: #000;
      box-shadow: 0 0 20px rgba(0,255,65,0.25);
      display: block;
      image-rendering: pixelated;
    }

    /* ===== STATUS ===== */
    .game-status {
      font-size: 15px;
      color: #ffff00;
      letter-spacing: 3px;
      height: 20px;
    }

    .game-status.blink { animation: blink-anim 0.8s step-end infinite; }

    @keyframes blink-anim {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ===== SPEED SELECTOR ===== */
    .options-row {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 12px;
      color: #aaa;
    }

    .options-row label { color: #00ffff; }

    .retro-select {
      background: #000;
      color: #00ff41;
      border: 2px solid #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 3px 8px;
    }

    /* ===== CONTROLS ===== */
    .controls-info {
      display: flex;
      gap: 30px;
      font-size: 12px;
      color: #555;
    }

    .controls-info span { color: #00ffff; }

    /* ===== BUTTONS ===== */
    .start-btn {
      background: #003300;
      color: #00ff41;
      border: 2px solid #00ff41;
      padding: 10px 30px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 3px;
    }

    .start-btn:hover { background: #005500; }
    .start-btn:active { background: #001100; border-style: inset; }

    footer {
      width: 100%;
      text-align: center;
      padding: 10px;
      border-top: 1px solid #111;
      font-size: 11px;
      color: #333;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="page-header">
  <h1>SNAKE</h1>
  <a href="/" class="back-btn">◄ VOLTAR PARA HOME</a>
</div>

<!-- GAME CONTAINER -->
<div class="game-container">

  <!-- HUD -->
  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">PONTOS</div>
      <div class="hud-value" id="scoreDisplay">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">MELHOR</div>
      <div class="hud-value" id="hiScoreDisplay">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">NÍVEL</div>
      <div class="hud-value" id="levelDisplay">1</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">TAMANHO</div>
      <div class="hud-value" id="sizeDisplay">3</div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="game-status blink" id="gameStatus">PRESSIONE INICIAR</div>

  <!-- CANVAS -->
  <canvas id="snakeCanvas" width="500" height="500"></canvas>

  <!-- OPTIONS -->
  <div class="options-row">
    <label>VELOCIDADE:</label>
    <select class="retro-select" id="speedSel">
      <option value="200">LENTA</option>
      <option value="130" selected>NORMAL</option>
      <option value="80">RÁPIDA</option>
      <option value="50">INSANA</option>
    </select>
  </div>

  <!-- CONTROLS INFO -->
  <div class="controls-info">
    <div><span>↑ ↓ ← →</span> MOVER</div>
    <div>Coma a <span>maçã</span> para crescer!</div>
    <div>Não bata nas <span>paredes</span> ou em si mesmo!</div>
  </div>

  <!-- START BUTTON -->
  <button class="start-btn" id="startBtn">[ INICIAR JOGO ]</button>

</div>

<footer>© 1998 Retro Games Archive — SNAKE v1.0</footer>

<script>
  // ===================================================
  //  SNAKE — JavaScript puro com Canvas
  // ===================================================

  const canvas  = document.getElementById('snakeCanvas');
  const ctx     = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ---- DOM ----
  const scoreEl    = document.getElementById('scoreDisplay');
  const hiScoreEl  = document.getElementById('hiScoreDisplay');
  const levelEl    = document.getElementById('levelDisplay');
  const sizeEl     = document.getElementById('sizeDisplay');
  const statusEl   = document.getElementById('gameStatus');
  const startBtn   = document.getElementById('startBtn');
  const speedSel   = document.getElementById('speedSel');

  // ---- Constantes ----
  const CELL    = 20;              // tamanho de cada célula em px
  const COLS    = W / CELL;        // 25 colunas
  const ROWS    = H / CELL;        // 25 linhas

  // ---- Estado ----
  let snake, dir, nextDir, food, score, hiScore, level, gameLoop, state;

  hiScore = parseInt(localStorage.getItem('snake_hi') || '0', 10);
  hiScoreEl.textContent = hiScore;

  // ---- Direções ----
  const DIR = { UP:[0,-1], DOWN:[0,1], LEFT:[-1,0], RIGHT:[1,0] };

  // ---- Inicializar ----
  function initGame() {
    // Cobra começa com 3 segmentos no centro
    snake = [
      { x: 14, y: 12 },
      { x: 13, y: 12 },
      { x: 12, y: 12 },
    ];
    dir     = DIR.RIGHT;
    nextDir = DIR.RIGHT;
    score   = 0;
    level   = 1;
    spawnFood();
    updateHUD();
  }

  // ---- Spawnar comida (evitar corpo da cobra) ----
  function spawnFood() {
    let fx, fy, tries = 0;
    do {
      fx = Math.floor(Math.random() * COLS);
      fy = Math.floor(Math.random() * ROWS);
      tries++;
    } while (snake.some(s => s.x === fx && s.y === fy) && tries < 200);
    food = { x: fx, y: fy };
  }

  // ---- Atualizar HUD ----
  function updateHUD() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    sizeEl.textContent  = snake.length;
    if (score > hiScore) {
      hiScore = score;
      hiScoreEl.textContent = hiScore;
      localStorage.setItem('snake_hi', hiScore);
    }
  }

  // ---- Lógica de tick ----
  function tick() {
    // Aplicar direção
    dir = nextDir;
    const head = { x: snake[0].x + dir[0], y: snake[0].y + dir[1] };

    // Colisão com paredes
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }

    // Colisão consigo mesmo
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    // Comeu a comida?
    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      // Sobe de nível a cada 5 comidas
      if (snake.length % 5 === 0) level++;
      spawnFood();
      updateHUD();
      // Não remove o rabo → cobra cresce
    } else {
      snake.pop(); // remove o rabo
    }

    draw();
  }

  // ---- Desenho ----
  function draw() {
    // Fundo
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Grade
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= W; x += CELL) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y <= H; y += CELL) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Comida — pulsando
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur  = 10 * pulse;
    ctx.fillStyle   = '#ff2222';
    ctx.fillRect(food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6);

    // Brilho extra da comida
    ctx.fillStyle = '#ff8888';
    ctx.fillRect(food.x * CELL + 5, food.y * CELL + 5, 4, 4);

    ctx.shadowBlur = 0;

    // Cobra — corpo
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      if (isHead) {
        ctx.shadowColor = '#00ff41';
        ctx.shadowBlur  = 14;
        ctx.fillStyle   = '#00ff41';
      } else {
        ctx.shadowBlur = 0;
        // Gradiente do corpo: vai escurecendo
        const t = i / snake.length;
        const g = Math.floor(255 * (1 - t * 0.6));
        ctx.fillStyle = `rgb(0,${g},0)`;
      }
      ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);

      // Olhos na cabeça
      if (isHead) {
        ctx.fillStyle = '#000';
        ctx.shadowBlur = 0;
        // posição dos olhos conforme direção
        let ex1, ey1, ex2, ey2;
        const bx = seg.x * CELL, by = seg.y * CELL;
        if (dir === DIR.RIGHT) { ex1=bx+13; ey1=by+4; ex2=bx+13; ey2=by+12; }
        else if (dir === DIR.LEFT)  { ex1=bx+3; ey1=by+4; ex2=bx+3; ey2=by+12; }
        else if (dir === DIR.UP)    { ex1=bx+4; ey1=by+3; ex2=bx+12; ey2=by+3; }
        else                        { ex1=bx+4; ey1=by+13; ex2=bx+12; ey2=by+13; }
        ctx.fillRect(ex1, ey1, 3, 3);
        ctx.fillRect(ex2, ey2, 3, 3);
      }
    });

    ctx.shadowBlur = 0;
  }

  // ---- Game Over ----
  function gameOver() {
    clearInterval(gameLoop);
    state = 'gameover';

    // Flash vermelho
    ctx.fillStyle = 'rgba(255,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur  = 20;
    ctx.font = 'bold 40px Courier New';
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    ctx.shadowBlur = 0;
    ctx.font = '16px Courier New';
    ctx.fillStyle = '#ffff00';
    ctx.fillText(`PONTOS: ${score}`, W/2, H/2 + 20);

    statusEl.textContent = `✗ GAME OVER! ${score} pontos`;
    statusEl.style.color = '#ff4444';
    statusEl.classList.add('blink');
    startBtn.textContent = '[ JOGAR NOVAMENTE ]';
    state = 'gameover';
  }

  // ---- Tela idle ----
  function drawIdle() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Grade
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= W; x += CELL) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for (let y = 0; y <= H; y += CELL) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ff41';
    ctx.shadowColor = '#00ff41';
    ctx.shadowBlur  = 20;
    ctx.font = 'bold 52px Courier New';
    ctx.fillText('SNAKE', W/2, H/2 - 20);
    ctx.shadowBlur = 0;

    ctx.font = '14px Courier New';
    ctx.fillStyle = '#555';
    ctx.fillText('Nokia — 1997', W/2, H/2 + 20);
  }

  // ---- Controles ----
  document.addEventListener('keydown', e => {
    switch(e.key) {
      case 'ArrowUp':
        e.preventDefault();
        if (dir !== DIR.DOWN) nextDir = DIR.UP;
        break;
      case 'ArrowDown':
        e.preventDefault();
        if (dir !== DIR.UP) nextDir = DIR.DOWN;
        break;
      case 'ArrowLeft':
        e.preventDefault();
        if (dir !== DIR.RIGHT) nextDir = DIR.LEFT;
        break;
      case 'ArrowRight':
        e.preventDefault();
        if (dir !== DIR.LEFT) nextDir = DIR.RIGHT;
        break;
    }
  });

  // ---- Botão Iniciar ----
  startBtn.addEventListener('click', () => {
    if (gameLoop) clearInterval(gameLoop);
    initGame();
    state = 'playing';
    statusEl.textContent = '';
    statusEl.style.color = '#ffff00';
    statusEl.classList.remove('blink');
    startBtn.textContent = '[ REINICIAR ]';

    const interval = parseInt(speedSel.value, 10);
    gameLoop = setInterval(tick, interval);
    draw();
  });

  // ---- Tela inicial ----
  drawIdle();
</script>
</body>
</html>
